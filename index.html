<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https:;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iTraducer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Literata:ital,opsz,wght@0,7..72,300..700;1,7..72,300..700&display=swap" rel="stylesheet">
    <style>
        * {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            background-color: #0d1117;
            margin: 0;
            padding: 0;
            overflow: hidden;
            color: #e6edf3;
        }
        ::selection {
            background-color: rgba(88, 166, 255, 0.25);
            color: #fff;
        }
        @keyframes progress {
            0% { transform: scaleX(0); }
            50% { transform: scaleX(0.7); }
            100% { transform: scaleX(1); }
        }
        .animate-progress {
            animation: progress 2.5s ease-in-out infinite;
            transform-origin: left;
        }
    </style>
    <link rel="stylesheet" href="/src/index.css">
</head>
<body>
    <div id="root"></div>
<script type="module" src="/src/index.tsx"></script>
</body>
</html>
